<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg:      #07090c;
  --bg2:     #0e1115;
  --bg3:     #141820;
  --bg4:     #1a1f28;
  --border:  #1e242f;
  --dim:     #283040;
  --muted:   #3d4a5c;
  --text:    #b8c4d4;
  --hi:      #e2eaf6;
  --accent:  #e8a020;
  --green:   #36d672;
  --red:     #f04545;
  --blue:    #4fa3f7;
  --purple:  #a87afc;
  --mono:    'DM Mono', monospace;
  --sans:    'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
body { padding: 0; }

/* ── SCANLINE OVERLAY ── */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
  );
}

/* ── LAYOUT ── */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 0;
  z-index: 10;
}
.sidebar-logo {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sidebar-logo .logo-main {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--hi);
  line-height: 1;
}
.sidebar-logo .logo-main span { color: var(--accent); }
.sidebar-logo .logo-sub {
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .12em;
  color: var(--muted);
  margin-top: 5px;
}

.nav-label {
  font-family: var(--mono);
  font-size: .55rem;
  letter-spacing: .2em;
  color: var(--muted);
  text-transform: uppercase;
  padding: 0 20px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-family: var(--sans);
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .04em;
  color: var(--muted);
  border-left: 2px solid transparent;
  transition: all .15s;
  text-transform: uppercase;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
.nav-item.active { color: var(--hi); border-left-color: var(--accent); background: rgba(232,160,32,.06); }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.sidebar-footer .sf-label { font-family: var(--mono); font-size: .55rem; letter-spacing: .14em; color: var(--muted); margin-bottom: 4px; }
.sidebar-footer .sf-val   { font-family: var(--mono); font-size: .8rem;  color: var(--text); }

/* ── MAIN CONTENT ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  gap: 16px; flex-wrap: wrap;
}
.topbar-left { display: flex; align-items: baseline; gap: 12px; }
.page-title { font-weight: 800; font-size: 1.1rem; letter-spacing: .06em; text-transform: uppercase; color: var(--hi); }
.page-subtitle { font-family: var(--mono); font-size: .62rem; color: var(--muted); letter-spacing: .1em; }

.signal-pill {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  padding: 6px 14px; flex-wrap: wrap; gap: 8px;
}
.sp-label { font-family: var(--mono); font-size: .58rem; letter-spacing: .14em; color: var(--muted); }
.sp-val   { font-family: var(--mono); font-size: .9rem;  font-weight: 500; }
.sp-val.cash     { color: var(--muted); }
.sp-val.small    { color: var(--accent); }
.sp-val.moderate { color: var(--blue); }
.sp-val.large    { color: var(--green); }
.sp-val.full     { color: var(--green); text-shadow: 0 0 12px rgba(54,214,114,.4); }

.load-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--accent); color: #000;
  font-family: var(--sans); font-weight: 700; font-size: .8rem; letter-spacing: .06em;
  padding: 7px 16px; cursor: pointer; border: none; text-transform: uppercase;
  transition: opacity .15s;
}
.load-btn:hover { opacity: .85; }
input[type=file] { display: none; }

/* ── PANELS ── */
.panel { display: none; flex: 1; padding: 24px 28px; flex-direction: column; gap: 18px; }
.panel.active { display: flex; }

/* ── LIVE SIGNAL BAND (overview only) ── */
.signal-band {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.sig-tile {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 12px 14px; border-top: 2px solid var(--dim);
}
.sig-tile.accent { border-top-color: var(--accent); }
.sig-tile.green  { border-top-color: var(--green); }
.sig-tile.red    { border-top-color: var(--red); }
.sig-tile.blue   { border-top-color: var(--blue); }
.st-label { font-family: var(--mono); font-size: .54rem; letter-spacing: .16em; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; }
.st-val   { font-family: var(--mono); font-size: 1.2rem; color: var(--hi); }
.st-val.pos { color: var(--green); } .st-val.neg { color: var(--red); }
.st-sub   { font-family: var(--mono); font-size: .6rem; color: var(--muted); margin-top: 3px; }

/* ── WARNING BAND ── */
.warn-band {
  background: rgba(248,196,32,.06); border: 1px solid rgba(248,196,32,.25);
  padding: 10px 16px; display: flex; align-items: flex-start; gap: 10px;
}
.warn-band .w-icon { font-size: 1rem; flex-shrink: 0; }
.warn-band .w-msg  { font-family: var(--mono); font-size: .75rem; color: #f8c420; line-height: 1.5; }

/* ── STRATEGY PANELS ── */
.strat-header {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.strat-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.strat-name { font-weight: 800; font-size: 1.2rem; letter-spacing: .06em; text-transform: uppercase; color: var(--hi); }
.strat-desc { font-family: var(--mono); font-size: .62rem; color: var(--muted); margin-left: auto; max-width: 340px; text-align: right; line-height: 1.5; }

/* ── CHART ROWS ── */
.chart-row { display: grid; gap: 14px; }
.chart-row.two   { grid-template-columns: 3fr 2fr; }
.chart-row.three { grid-template-columns: 2fr 1fr 1fr; }
@media (max-width: 900px) { .chart-row.two, .chart-row.three { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 16px;
}
.chart-card .cc-title {
  font-family: var(--mono); font-size: .58rem;
  letter-spacing: .16em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.cc-tag {
  font-size: .52rem; padding: 2px 7px;
  border: 1px solid var(--dim); color: var(--muted);
  letter-spacing: .1em;
}
.cc-tag.forecast { border-color: rgba(79,163,247,.3); color: var(--blue); }
.chart-card canvas { max-height: 240px; }

/* ── SIGNAL TIMELINE ── */
.timeline-wrap { background: var(--bg2); border: 1px solid var(--border); padding: 16px; }
.timeline-title { font-family: var(--mono); font-size: .58rem; letter-spacing: .16em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
.timeline {
  display: flex; flex-wrap: nowrap; overflow-x: auto;
  gap: 2px; padding-bottom: 6px;
}
.timeline::-webkit-scrollbar { height: 4px; }
.timeline::-webkit-scrollbar-track { background: var(--bg3); }
.timeline::-webkit-scrollbar-thumb { background: var(--dim); }
.tbar {
  flex-shrink: 0; width: 10px; height: 36px;
  position: relative; cursor: default;
  transition: opacity .1s;
}
.tbar:hover { opacity: .75; }
.tbar .tb-tip {
  display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: var(--bg4); border: 1px solid var(--border);
  padding: 5px 9px; white-space: nowrap;
  font-family: var(--mono); font-size: .58rem; color: var(--hi);
  pointer-events: none; z-index: 100;
}
.tbar:hover .tb-tip { display: block; }
.today-line {
  flex-shrink: 0; width: 2px; background: rgba(232,160,32,.8);
  height: 36px; position: relative;
}
.today-line::after {
  content: 'TODAY'; position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono); font-size: .5rem; letter-spacing: .1em;
  color: var(--accent); white-space: nowrap;
}
/* forecast section of timeline */
.tbar.forecast { opacity: .45; }

/* ── UNREAL BOX (Buy-Only) ── */
.unreal-box {
  background: rgba(54,214,114,.05);
  border: 1px solid rgba(54,214,114,.18);
  padding: 14px 18px;
}
.ub-title { font-family: var(--mono); font-size: .58rem; letter-spacing: .16em; color: var(--green); text-transform: uppercase; margin-bottom: 10px; }
.ub-row { display: flex; flex-wrap: wrap; gap: 0; }
.ub-cell { flex: 1; min-width: 120px; padding: 8px 14px; border-right: 1px solid rgba(54,214,114,.1); }
.ub-cell:last-child { border-right: none; }
.ub-label { font-family: var(--mono); font-size: .55rem; letter-spacing: .14em; color: var(--muted); margin-bottom: 4px; }
.ub-val   { font-family: var(--mono); font-size: 1rem; color: var(--hi); }
.ub-val.pos { color: var(--green); } .ub-val.neg { color: var(--red); }
.ub-note  { font-family: var(--mono); font-size: .6rem; color: var(--muted); line-height: 1.5; }
</style>
</head>

<div class="shell">

<!-- ── SIDEBAR ── -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-main">WAR<span>TRADE</span></div>
    <div class="logo-sub">SIGNAL DASHBOARD</div>
  </div>

  <div class="nav-label">Strategies</div>
  <div id="navItems"></div>

  <div class="sidebar-footer">
    <div class="sf-label">Generated</div>
    <div class="sf-val" id="sfGen">—</div>
    <div class="sf-label" style="margin-top:8px">Ticker</div>
    <div class="sf-val" id="sfTicker">—</div>
  </div>
</nav>

<!-- ── MAIN ── -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-title" id="pageTitle">Overview</div>
      <div class="page-subtitle" id="pageSubtitle">Load signal_output.json to begin</div>
    </div>
    <div class="signal-pill" id="signalPill" style="display:none">
      <span class="sp-label">TODAY'S SIGNAL</span>
      <span class="sp-val" id="spVal">—</span>
      <span class="sp-label" style="margin-left:8px">ALLOC</span>
      <span class="sp-val" id="spAlloc">—</span>
    </div>
    <label class="load-btn" for="fileInput">⬆ Load JSON</label>
    <input type="file" id="fileInput" accept=".json"/>
  </div>

  <!-- PANELS injected here -->
  <div id="panelArea" style="flex:1;display:flex;flex-direction:column"></div>

</div><!-- .main -->
</div><!-- .shell -->

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let DATA = null;
let activeTab = 'overview';
const charts = {};   // canvas-id → Chart instance

// ── FILE LOAD ─────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      DATA = JSON.parse(ev.target.result);
      init();
    } catch(err) { alert('JSON parse error: ' + err.message); }
  };
  r.readAsText(file);
});

// ── HELPERS ───────────────────────────────────────────────────────────────
const pct  = (v, d=1) => (v >= 0 ? '+' : '') + (v * 100).toFixed(d) + '%';
const usd  = v => '$' + Number(v).toLocaleString('en-US', {maximumFractionDigits: 0});
const sgn  = v => v >= 0 ? 'pos' : 'neg';
const fmtD = iso => iso.slice(5); // MM-DD

function signalClass(sig) {
  if (!sig) return '';
  if (sig.includes('CASH'))     return 'cash';
  if (sig.includes('SMALL'))    return 'small';
  if (sig.includes('MODERATE')) return 'moderate';
  if (sig.includes('LARGE'))    return 'large';
  return 'full';
}
function signalColor(alloc) {
  if (alloc === 0)    return '#3d4a5c';
  if (alloc <= 0.25)  return '#e8a020';
  if (alloc <= 0.50)  return '#4fa3f7';
  if (alloc <= 0.75)  return '#36d672';
  return '#36d672';
}

// ── CHART DEFAULTS ────────────────────────────────────────────────────────
function equityOpts(color, todayStr) {
  return {
    responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
    plugins: {
      legend: { labels: { color: '#3d4a5c', font: { family: "'DM Mono'" }, boxWidth: 12 } },
      tooltip: {
        backgroundColor: '#141820', borderColor: '#1e242f', borderWidth: 1,
        titleColor: '#e2eaf6', bodyColor: '#b8c4d4',
        callbacks: { label: ctx => ' ' + usd(ctx.parsed.y) }
      }
    },
    scales: {
      x: { type: 'time', time: { unit: 'week' },
           grid: { color: '#0e1115' },
           ticks: { color: '#283040', font: { family: "'DM Mono'", size: 9 } } },
      y: { grid: { color: '#141820' },
           ticks: { color: '#283040', font: { family: "'DM Mono'", size: 9 },
                    callback: v => '$' + (v / 1000).toFixed(0) + 'k' } }
    }
  };
}
function allocOpts() {
  return {
    responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
    plugins: { legend: { display: false },
      tooltip: { backgroundColor: '#141820', borderColor: '#1e242f', borderWidth: 1,
                 titleColor: '#e2eaf6', bodyColor: '#b8c4d4',
                 callbacks: { label: ctx => ' ' + (ctx.parsed.y * 100).toFixed(0) + '%' } } },
    scales: {
      x: { type: 'time', time: { unit: 'week' },
           grid: { color: '#0e1115' },
           ticks: { color: '#283040', font: { family: "'DM Mono'", size: 9 } } },
      y: { min: 0, max: 1, grid: { color: '#141820' },
           ticks: { color: '#283040', font: { family: "'DM Mono'", size: 9 },
                    callback: v => (v * 100).toFixed(0) + '%' } }
    }
  };
}

function todayAnnotationPlugin(todayStr) {
  return {
    id: 'todayLine',
    afterDraw(chart) {
      const xScale = chart.scales.x;
      if (!xScale) return;
      const x = xScale.getPixelForValue(new Date(todayStr).getTime());
      if (x < xScale.left || x > xScale.right) return;
      const ctx = chart.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, chart.chartArea.top);
      ctx.lineTo(x, chart.chartArea.bottom);
      ctx.strokeStyle = 'rgba(232,160,32,0.5)';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.stroke();
      ctx.fillStyle = 'rgba(232,160,32,0.8)';
      ctx.font = "9px 'DM Mono'";
      ctx.fillText('TODAY', x + 3, chart.chartArea.top + 10);
      ctx.restore();
    }
  };
}

// ── BUILD CHART: PRE-CONTEXT + STRATEGY + FORECAST ───────────────────────
// Three visual zones on one continuous timeline:
//   ① Context (dim)   — raw equity price, rescaled to initial_capital, before strategy start
//   ② Portfolio       — actual portfolio value from strategy start → today
//   ③ Forecast fan    — Monte Carlo bands from today forward
// Two vertical marker lines: STRATEGY START and TODAY
function buildEquityForecastChart(canvasId, strat, stratStartStr, todayStr) {
  const el = document.getElementById(canvasId);
  if (!el) return;
  if (charts[canvasId]) { charts[canvasId].destroy(); }

  const color   = strat.color;
  const context = DATA.context || [];
  const hist    = strat.history;
  const fc      = strat.forecast;
  const initCap = DATA.initial_capital;

  // ── Zone ①: context — price rescaled so it ends at initial_capital
  // This lets the context line visually connect to the strategy line at start
  let contextData = [];
  if (context.length > 0) {
    const lastCtxPrice = context[context.length - 1].price;
    const scale = lastCtxPrice > 0 ? initCap / lastCtxPrice : 1;
    contextData = context.map(b => ({
      x:     b.date,
      y:     round2(b.price * scale),
      price: b.price,
      dd:    b.drawdown,
      spk:   b.oil_spike,
    }));
  }

  // ── Zone ②: strategy portfolio value
  const histData = hist.map(b => ({
    x:      b.date,
    y:      b.portfolio_value,
    shares: b.shares_value,
    cash:   b.cash_remaining,
    alloc:  b.allocation,
    sig:    b.signal,
  }));

  // ── Zone ③: forecast fan — bridge from last history bar
  const lastHist = hist[hist.length - 1];
  const bridge   = { x: lastHist.date, y: lastHist.portfolio_value };
  const fcP50 = [bridge, ...fc.dates.map((d, i) => ({ x: d, y: fc.p50[i] }))];
  const fcP25 = [bridge, ...fc.dates.map((d, i) => ({ x: d, y: fc.p25[i] }))];
  const fcP75 = [bridge, ...fc.dates.map((d, i) => ({ x: d, y: fc.p75[i] }))];
  const fcP10 = [bridge, ...fc.dates.map((d, i) => ({ x: d, y: fc.p10[i] }))];
  const fcP90 = [bridge, ...fc.dates.map((d, i) => ({ x: d, y: fc.p90[i] }))];

  const opts = equityOpts(color, todayStr);
  opts.plugins.legend.display = true;
  opts.plugins.legend.labels.filter = item => !item.text.startsWith('_');

  // Rich tooltip: different detail per zone
  opts.plugins.tooltip.callbacks = {
    title: items => items[0]?.label || '',
    label: ctx => {
      const v   = ctx.parsed.y;
      const raw = ctx.raw;
      if (raw?.shares !== undefined) {
        return [
          ` Portfolio: ${usd(v)}`,
          ` ├ Shares:  ${usd(raw.shares)}  (${(raw.alloc*100).toFixed(0)}%)`,
          ` └ Cash:    ${usd(raw.cash)}  (${((1-raw.alloc)*100).toFixed(0)}%)`,
          ` Signal:   ${raw.sig}`,
        ];
      }
      if (raw?.price !== undefined) {
        return [
          ` Mkt price: $${raw.price}  (rescaled: ${usd(v)})`,
          ` Drawdown:  ${(raw.dd*100).toFixed(1)}%`,
          ` Oil spike: ${(raw.spk*100).toFixed(1)}%`,
          ` (Pre-strategy context)`,
        ];
      }
      return ` ${ctx.dataset.label}: ${usd(v)}`;
    },
  };

  // Triple annotation plugin: strategy start + today + war end
  const dualAnnotationPlugin = {
    id: 'dualLines',
    afterDraw(chart) {
      const xScale = chart.scales.x;
      if (!xScale) return;
      const ctx2 = chart.ctx;

      const drawLine = (dateStr, color, label, dash) => {
        const x = xScale.getPixelForValue(new Date(dateStr).getTime());
        if (x < xScale.left || x > xScale.right) return;
        ctx2.save();
        ctx2.beginPath();
        ctx2.moveTo(x, chart.chartArea.top);
        ctx2.lineTo(x, chart.chartArea.bottom);
        ctx2.strokeStyle = color;
        ctx2.lineWidth   = 1.5;
        ctx2.setLineDash(dash);
        ctx2.stroke();
        ctx2.fillStyle = color;
        ctx2.font = "9px 'DM Mono'";
        ctx2.fillText(label, x + 3, chart.chartArea.top + 10);
        ctx2.restore();
      };

      if (stratStartStr && stratStartStr !== todayStr)
        drawLine(stratStartStr, 'rgba(79,163,247,0.7)',  'START',   [3, 3]);
      drawLine(todayStr,        'rgba(232,160,32,0.7)',  'TODAY',   [4, 3]);
      if (DATA.war_end_date)
        drawLine(DATA.war_end_date, 'rgba(54,214,114,0.8)', 'WAR END', [2, 2]);
    }
  };

  charts[canvasId] = new Chart(el, {
    type: 'line',
    data: {
      datasets: [
        // outer forecast band P10–P90
        { label: 'P10–P90',  data: fcP90,
          borderWidth: 0, pointRadius: 0,
          backgroundColor: color + '18', fill: '-1', tension: 0.4,
          borderColor: 'transparent' },
        { label: '_p10', data: fcP10,
          borderWidth: 0, pointRadius: 0,
          backgroundColor: color + '18', fill: false, tension: 0.4,
          borderColor: 'transparent' },
        // inner forecast band P25–P75
        { label: 'P25–P75', data: fcP75,
          borderWidth: 0, pointRadius: 0,
          backgroundColor: color + '30', fill: '-1', tension: 0.4,
          borderColor: 'transparent' },
        { label: '_p25', data: fcP25,
          borderWidth: 0, pointRadius: 0,
          backgroundColor: color + '30', fill: false, tension: 0.4,
          borderColor: 'transparent' },
        // forecast median dashed
        { label: 'Forecast (median)',
          data: fcP50,
          borderColor: color + '88', borderWidth: 1.5,
          borderDash: [5, 3], pointRadius: 0, tension: 0.4, fill: false },
        // active strategy portfolio — solid
        { label: 'Portfolio Value',
          data: histData,
          borderColor: color, borderWidth: 2,
          backgroundColor: color + '12', fill: true,
          pointRadius: 0, tension: 0.3 },
        // pre-strategy context — dim, dashed, no fill
        { label: 'Market (pre-strategy)',
          data: contextData,
          borderColor: 'rgba(180,200,220,0.35)',
          borderWidth: 1.5,
          borderDash: [3, 3],
          backgroundColor: 'transparent', fill: false,
          pointRadius: 0, tension: 0.3 },
      ]
    },
    options: opts,
    plugins: [dualAnnotationPlugin],
  });
}

function round2(v) { return Math.round(v * 100) / 100; }

// ── BUILD CHART: ALLOCATION / DEPLOYMENT BARS ────────────────────────────
function buildAllocChart(canvasId, strat, stratStartStr, todayStr) {
  const el = document.getElementById(canvasId);
  if (!el) return;
  if (charts[canvasId]) { charts[canvasId].destroy(); }

  const hist = strat.history;
  const fc   = strat.forecast;

  const histBars = hist.map(b => ({
    x: b.date,
    y: b.allocation,
    color: signalColor(b.allocation) + 'cc',
  }));
  const fcBars = fc.dates.map((d, i) => ({
    x: d,
    y: fc.alloc_median[i],
    color: signalColor(fc.alloc_median[i]) + '55',
  }));
  const allBars = [...histBars, ...fcBars];

  // Triple marker for alloc chart too
  const dualPlugin = {
    id: 'dualLinesAlloc',
    afterDraw(chart) {
      const xScale = chart.scales.x;
      if (!xScale) return;
      const ctx2 = chart.ctx;
      const drawLine = (dateStr, clr, label, dash) => {
        const x = xScale.getPixelForValue(new Date(dateStr).getTime());
        if (x < xScale.left || x > xScale.right) return;
        ctx2.save();
        ctx2.beginPath();
        ctx2.moveTo(x, chart.chartArea.top);
        ctx2.lineTo(x, chart.chartArea.bottom);
        ctx2.strokeStyle = clr;
        ctx2.lineWidth   = 1.5;
        ctx2.setLineDash(dash);
        ctx2.stroke();
        ctx2.fillStyle = clr;
        ctx2.font = "9px 'DM Mono'";
        ctx2.fillText(label, x + 3, chart.chartArea.top + 10);
        ctx2.restore();
      };
      if (stratStartStr && stratStartStr !== todayStr)
        drawLine(stratStartStr, 'rgba(79,163,247,0.7)',  'START',   [3, 3]);
      drawLine(todayStr,        'rgba(232,160,32,0.7)',  'TODAY',   [4, 3]);
      if (DATA.war_end_date)
        drawLine(DATA.war_end_date, 'rgba(54,214,114,0.8)', 'WAR END', [2, 2]);
    }
  };

  const opts = allocOpts();
  charts[canvasId] = new Chart(el, {
    type: 'bar',
    data: {
      datasets: [{
        label: 'Allocation',
        data: allBars.map(b => ({ x: b.x, y: b.y })),
        backgroundColor: allBars.map(b => b.color),
        borderWidth: 0,
        barPercentage: 1.0, categoryPercentage: 1.0,
      }]
    },
    options: opts,
    plugins: [dualPlugin],
  });
}

// ── BUILD TIMELINE ────────────────────────────────────────────────────────
function buildTimeline(containerId, strat) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';

  strat.history.forEach(b => {
    const bar = document.createElement('div');
    bar.className = 'tbar';
    bar.style.background = signalColor(b.allocation);
    bar.innerHTML = `<div class="tb-tip">${b.date}<br>${b.signal}<br>${(b.allocation*100).toFixed(0)}%</div>`;
    el.appendChild(bar);
  });

  const todayLine = document.createElement('div');
  todayLine.className = 'today-line';
  el.appendChild(todayLine);

  strat.forecast.dates.forEach((d, i) => {
    const bar = document.createElement('div');
    bar.className = 'tbar forecast';
    bar.style.background = signalColor(strat.forecast.alloc_median[i]);
    bar.innerHTML = `<div class="tb-tip">${d}<br>Forecast median<br>${(strat.forecast.alloc_median[i]*100).toFixed(0)}%</div>`;
    el.appendChild(bar);
  });
}

      </div>
      <div>
        <div style="font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;color:var(--muted);margin-bottom:4px">OIL REVERSION TARGET</div>
        <div style="font-family:var(--mono);font-size:1.1rem;color:var(--text)">$${DATA.oil_baseline?.toFixed(2) || '—'} <span style="font-size:.7rem;color:var(--muted)">(pre-war baseline)</span></div>
      </div>
      <div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);max-width:320px;line-height:1.6">
        Oil mean-reverts ~85% of the way toward the pre-war baseline by this date.
        As oil normalises, the strategy's buy signals reduce — the forecast bands
        reflect this unwinding of the war premium.
      </div>
    </div>` : '';

  const key = strat.name.replace(/\W/g,'_');

  container.innerHTML = `
    <div class="strat-header">
      <div class="strat-dot" style="background:${strat.color}"></div>
      <div class="strat-name">${strat.name}</div>
      <div class="strat-desc">${descMap[strat.name] || ''}</div>
    </div>

    ${kpiHtml}
    ${buyOnlyNote}
    ${warEndNote}

    <div class="chart-row two">
      <div class="chart-card">
        <div class="cc-title">
          Portfolio Value — History &amp; Forecast
          <span class="cc-tag forecast">HOVER FOR SHARES + CASH BREAKDOWN</span>
        </div>
        <canvas id="ceq_${key}" style="height:240px"></canvas>
      </div>
      <div class="chart-card">
        <div class="cc-title">
          ${isBuyOnly ? 'Cumulative Cash Deployed %' : 'Daily Allocation %'}
          <span class="cc-tag forecast">INCLUDES FORECAST MEDIAN</span>
        </div>
        <canvas id="cal_${key}" style="height:240px"></canvas>
      </div>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-title">Signal Timeline — History (solid) &nbsp;|&nbsp; Forecast Median (faded) &nbsp;|&nbsp; Hover for detail</div>
      <div class="timeline" id="tl_${key}"></div>
    </div>`;

  // Render charts on next tick (DOM must be ready)
  requestAnimationFrame(() => {
    buildEquityForecastChart(`ceq_${key}`, strat, stratStartStr, todayStr);
    buildAllocChart(`cal_${key}`, strat, stratStartStr, todayStr);
    buildTimeline(`tl_${key}`, strat);
  });
}

// ── INIT / NAV ────────────────────────────────────────────────────────────
function init() {
  if (!DATA) return;

  // Topbar
  document.getElementById('sfGen').textContent    = DATA.generated || '—';
  document.getElementById('sfTicker').textContent = DATA.ticker + ' / ' + DATA.oil_ticker;
  document.getElementById('signalPill').style.display = '';
  document.getElementById('spVal').textContent   = DATA.live.signal;
  document.getElementById('spVal').className     = 'sp-val ' + signalClass(DATA.live.signal);
  document.getElementById('spAlloc').textContent = (DATA.live.allocation * 100).toFixed(0) + '%';

  const todayStr      = DATA.live.date;
  const stratStartStr = DATA.strategy_start || todayStr;

  // Build nav
  const navEl = document.getElementById('navItems');
  navEl.innerHTML = '';

  const navDefs = [
    { id: 'overview', label: 'Overview', color: '#e8a020' },
    ...DATA.strategies.map(s => ({ id: s.name, label: s.name, color: s.color })),
  ];

  navDefs.forEach(nav => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (nav.id === 'overview' ? ' active' : '');
    el.dataset.tab = nav.id;
    el.innerHTML = `<span class="nav-dot" style="background:${nav.color}"></span>${nav.label}`;
    el.addEventListener('click', () => switchTab(nav.id, stratStartStr, todayStr));
    navEl.appendChild(el);
  });

  // Build panels
  const area = document.getElementById('panelArea');
  area.innerHTML = '';

  const ovPanel = document.createElement('div');
  ovPanel.className = 'panel active';
  ovPanel.id = 'panel_overview';
  area.appendChild(ovPanel);
  buildOverviewPanel(ovPanel);

  DATA.strategies.forEach(s => {
    const p = document.createElement('div');
    p.className = 'panel';
    p.id = 'panel_' + s.name.replace(/\W/g,'_');
    area.appendChild(p);
  });

  switchTab('overview', stratStartStr, todayStr);
}

function switchTab(tabId, stratStartStr, todayStr) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tabId);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  const panelId = 'panel_' + (tabId === 'overview' ? 'overview' : tabId.replace(/\W/g,'_'));
  const panel   = document.getElementById(panelId);
  if (!panel) return;
  panel.classList.add('active');

  const ctxDays  = DATA.context?.length || 0;
  const histDays = DATA.strategies[0]?.history?.length || 0;

  document.getElementById('pageTitle').textContent = tabId === 'overview' ? 'Overview' : tabId;
  document.getElementById('pageSubtitle').textContent = tabId === 'overview'
    ? `${ctxDays}d context · ${histDays}d strategy · ${DATA.forecast_days}d forecast · ${DATA.strategies.length} strategies`
    : `${ctxDays}d pre-strategy context + ${histDays}d active + ${DATA.forecast_days}d forecast`;

  if (tabId !== 'overview' && !panel.dataset.built) {
    panel.dataset.built = '1';
    const strat = DATA.strategies.find(s => s.name === tabId);
    if (strat) buildStrategyPanel(panel, strat, stratStartStr, todayStr);
  }
}
</script>

</html>
